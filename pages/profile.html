<div class="profile-page">

<div class="profile-header">

<img 
id="profilePhoto"
src="https://lh3.googleusercontent.com/d/1OhYLdfVOJH-IjYhKgZTMBY7PtEAtPXa7">

<input 
type="file"
id="photoInput"
accept="image/*"
>

<button onclick="uploadPhoto()">
Upload Photo
</button>

<h2 id="name">
Loading...
</h2>

<p>
Employee ID:
<span id="employeeID"></span>
</p>

</div>


<div class="profile-card">

<h3>
Personal Information
</h3>

<p>Mykad: <span id="mykad"></span></p>

<p>Gender: <span id="gender"></span></p>

<p>Phone: <span id="phone"></span></p>

<p>Email: <span id="email"></span></p>

<p>Address: <span id="address"></span></p>


</div>


<div class="profile-card">

<h3>
Work Information
</h3>


<p>Position: <span id="position"></span></p>

<p>Department: <span id="department"></span></p>

<p>Branch: <span id="branch"></span></p>

<p>Join Date: <span id="joinDate"></span></p>

<p>Role: <span id="role"></span></p>


</div>




<div class="setting-card">


<button onclick="loadPage('updateProfile')">
✏️ Update Profile
</button>


<button onclick="loadPage('changePassword')">
🔑 Change Password
</button>


<button onclick="logout()">
🚪 Logout
</button>


</div>


</div>
