<div class="leave-page">

<h2>Apply Leave</h2>

<!-- Leave Balance -->
<div id="leaveBalance" class="leave-balance"></div>

<!-- Form -->
<div class="leave-form">

<select id="leaveType"></select>

<input type="date" id="startDate">

<input type="date" id="endDate">

<div id="leaveDuration" class="leave-info">
0 Day
</div>

<div class="half-box">

<label>
<input type="radio" name="halfDay" value="" checked>
Full Day
</label>

<label>
<input type="radio" name="halfDay" value="AM">
Morning
</label>

<label>
<input type="radio" name="halfDay" value="PM">
Afternoon
</label>

</div>

<textarea
id="leaveReason"
rows="4"
placeholder="Reason">
</textarea>

<input
type="file"
id="leaveFile"
accept=".jpg,.jpeg,.png,.pdf">

<div id="filePreview"></div>

<button onclick="submitLeave()">
Submit Leave
</button>

</div>

<!-- Summary -->
<div id="leaveSummary"
class="leave-summary">
</div>

</div>
