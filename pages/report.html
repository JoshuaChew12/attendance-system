<div class="report-page">

<h2 id="reportTitle">
Attendance Report
</h2>


<div class="report-switch">

<button onclick="switchReport('attendance')">
Attendance
</button>

<button onclick="switchReport('leave')">
Leave
</button>

</div>

<!-- ================= Attendance ================= -->

<div id="attendanceMode">

<div class="report-filter">

<input type="date" id="fromDate">

<input type="date" id="toDate">

<div id="employeeBox"></div>

<button onclick="searchReport()">
Search
</button>

<button onclick="exportCSV()">
Export CSV
</button>


</div>


</div>

<!-- ================= Leave ================= -->
<div id="leaveMode" style="display:none">

<div class="leave-tabs" id="leaveTabs">

</div>

<div class="leave-filter" id="leaveFilter">

</div>

</div>


<div class="report-summary">

<div class="summary-card">
<p id="s1">Present</p>
<h2 id="sum1">0</h2>
</div>

<div class="summary-card">
<p id="s2">Late</p>
<h2 id="sum2">0</h2>
</div>

<div class="summary-card">
<p id="s3">Total Hours</p>
<h2 id="sum3">0</h2>
</div>

<div class="summary-card">
<p id="s4">Average</p>
<h2 id="sum4">0</h2>
</div>


</div>


<div id="reportResult"></div>


</div>
