<div class="report-page">

<h2 id="reportTitle">Attendance Report</h2>


<!-- SWITCH -->
<div class="report-switch">

<button onclick="switchReport('attendance')">
Attendance
</button>

<button onclick="switchReport('leave')">
Leave
</button>

</div>

<!-- FILTER -->
<div class="report-filter">

<input type="date" id="fromDate">
<input type="date" id="toDate">

<div id="branchBox"></div>
<div id="employeeBox"></div>

<button onclick="searchReport()">
Search
</button>

</div>


<!-- EXPORT -->
<div class="report-export">

<button onclick="exportPDF()">
PDF
</button>

<button onclick="exportExcel()">
Excel
</button>

<button onclick="exportCSV()">
CSV
</button>

</div>


<!-- LEAVE TAB -->
<div id="leaveTabs"></div>

<!-- SUMMARY -->
<div class="report-summary">

<div class="summary-card">
<p id="s1">Present</p>
<h2 id="sum1">0</h2>
</div>

<div class="summary-card">
<p id="s2">Late</p>
<h2 id="sum2">0</h2>
</div>

<div class="summary-card">
<p id="s3">Leave</p>
<h2 id="sum3">0</h2>
</div>

<div class="summary-card">
<p id="s4">Holiday</p>
<h2 id="sum4">0</h2>
</div>

<div class="summary-card">
<p id="s5">Weekly Off</p>
<h2 id="sum5">0</h2>
</div>

<div class="summary-card">
<p id="s6">Absent</p>
<h2 id="sum6">0</h2>
</div>

</div>

<!-- RESULT -->
<div id="reportResult"></div>

</div>
