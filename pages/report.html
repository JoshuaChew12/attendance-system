<div class="report-page">


<!-- HEADER -->
<div class="report-header">

<h2 id="reportTitle">
Attendance Report
</h2>


<button onclick="loadReport()">
↻
</button>

</div>


<!-- REPORT SWITCH -->
<div class="report-switch">

<button onclick="switchReport('attendance')">
Attendance
</button>

<button onclick="switchReport('leave')">
Leave
</button>

</div>




<!-- FILTER PANEL -->
<div class="report-filter">

<div class="filter-row">

<div>
<label>
From
</label>

<input 
type="date"
id="fromDate">

</div>


<div>

<label>
To
</label>

<input
type="date"
id="toDate">

</div>


</div>

<div id="branchBox"></div>
<div id="employeeBox"></div>

<!-- Leave Filter -->
<div id="leaveFilter"></div>

<button
class="search-btn"
onclick="searchReport()">

Search

</button>

</div>

<!-- KPI -->
<div class="report-kpi-box">
<div id="reportKPI"></div>
</div>

<!-- EXPORT TOOLBAR -->
<div class="report-toolbar">

<button onclick="exportPDF()">
PDF
</button>

<button onclick="exportExcel()">
Excel
</button>

<button onclick="exportCSV()">
CSV
</button>

</div>

<!-- LEAVE ACTION -->
<div id="leaveTabs">
</div>

<!-- RESULT -->
<div id="reportResult">
</div>

</div>
