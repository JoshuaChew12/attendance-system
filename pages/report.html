<div class="report-page">

<h2 id="reportTitle">
Attendance Report
</h2>

<!-- ================= SWITCH ================= -->
<div class="report-switch">

<button onclick="switchReport('attendance')">
Attendance
</button>

<button onclick="switchReport('leave')">
Leave
</button>

</div>

<!-- ================= FILTER ================= -->
<div class="report-filter">

<label>From</label>
<input type="date"id="fromDate">

<label>To</label>
<input type="date"id="toDate">

<!-- Employee -->
<div id="employeeBox">
</div>

<!-- Branch -->
<div id="branchBox">
</div>

<button onclick="searchReport()">
Search
</button>

</div>

<!-- ================= EXPORT ================= -->
<div class="export-box">

<button onclick="exportPDF()">
Download PDF
</button>

<button onclick="exportExcel()">
Download Excel
</button>

<button onclick="exportCSV()">
Download CSV
</button>

</div>

<!-- ================= ATTENDANCE ================= -->
<div id="attendanceMode">

<div class="report-summary">

<div class="summary-card">
<p>Present</p>
<h2 id="presentCount">
0
</h2>
</div>

<div class="summary-card">
<p>Late</p>
<h2 id="lateCount">
0
</h2>
</div>

<div class="summary-card">
<p>Leave</p>
<h2 id="leaveCount">
0
</h2>
</div>

<div class="summary-card">
<p>Holiday</p>
<h2 id="holidayCount">
0
</h2>
</div>

<div class="summary-card">
<p>Weekly Off</p>
<h2 id="weeklyOffCount">
0
</h2>
</div>

<div class="summary-card">
<p>Absent</p>
<h2 id="absentCount">
0
</h2>
</div>

</div>

</div>

<!-- ================= LEAVE ================= -->
<div id="leaveMode"
style="display:none"
>

<div 
class="leave-tabs"
id="leaveTabs">

</div>

<div 
class="leave-summary"
id="leaveSummary">

</div>

</div>

<!-- ================= RESULT ================= -->
<div id="reportResult">

</div>

</div>
