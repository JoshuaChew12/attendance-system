<div class="report-page">


<!-- HEADER -->
<div class="report-header">

<div>
<h2 id="reportTitle">
Attendance Report
</h2>

<span id="reportRole"></span>

</div>

</div>


<!-- SWITCH -->
<div class="report-tabs">

<button 
onclick="switchReport('attendance')">
Attendance
</button>

<button 
onclick="switchReport('leave')">
Leave
</button>

</div>

<!-- KPI -->
<div id="reportKPI"
class="kpi-grid">

</div>

<!-- FILTER -->
<div class="report-card filter-card">

<h3>Filter</h3>

<div class="date-row">

<input 
type="date"
id="fromDate">

<input 
type="date"
id="toDate">
</div>

<div id="branchBox"></div>

<div id="employeeBox"></div>

<button 
class="primary-btn"
onclick="searchReport()">

Search

</button>

</div>

<!-- EXPORT -->

<div class="report-card">
<h3>Export Report</h3>
<div class="export-grid">

<button onclick="exportPDF()">
PDF
</button>

<button onclick="exportExcel()">
Excel
</button>

<button onclick="exportCSV()">
CSV
</button>

</div>

</div>

<!-- LEAVE MENU -->

<div id="leaveTabs"
class="leave-menu">

</div>

<!-- RESULT -->

<div id="reportResult">

</div>

<!-- EXPORT MODAL -->
<div id="exportModal"
class="export-modal">

<div class="export-box">

<div id="exportLoading">
Generating Report...
</div>

<div id="exportDone"
style="display:none">

<h3>
Report Ready
</h3>

<p id="exportFileName"></p>

<button 
onclick="openExportFile()">

Open Download

</button>

</div>

</div>

</div>

</div>
