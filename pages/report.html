<div class="report-page">

<h2 id="reportTitle">Attendance Report</h2>


<!-- SWITCH -->
<div class="report-switch">

<button onclick="switchReport('attendance')">
Attendance
</button>

<button onclick="switchReport('leave')">
Leave
</button>

</div>

<!-- FILTER -->
<div class="report-filter">

<input type="date" id="fromDate">
<input type="date" id="toDate">

<div id="branchBox"></div>
<div id="employeeBox"></div>

<button onclick="searchReport()">
Search
</button>

</div>


<!-- EXPORT -->
<div class="report-export">

<button onclick="exportPDF()">
PDF
</button>

<button onclick="exportExcel()">
Excel
</button>

<button onclick="exportCSV()">
CSV
</button>

</div>


<!-- LEAVE TAB -->
<div id="leaveTabs"></div>

<!-- KPI -->
<div id="reportKPI"></div>

<!-- RESULT -->
<div id="reportResult"></div>

</div>
