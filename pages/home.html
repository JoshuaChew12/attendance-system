<div class="home">

<div class="welcome-card">

  <p>

  </p>

</div>


<!-- TODAY STATUS -->
<div class="attendance-card">

  <h3>Today's Attendance</h3>

    <div>

</div>

  <div class="stat-card">
    <p>Present</p>
    <h1 id="present">0</h1>
  </div>

  <div class="stat-card">
    <p>Late</p>
    <h1 id="late">0</h1>
  </div>

</div>


<!-- STATE -->

  <h3>Status</h3>
  <h2 id="statusText">Loading...</h2>
