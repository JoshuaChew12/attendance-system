<div class="calendar-page">

<!-- Header -->
<div class="calendar-header">

<button onclick="prevMonth()">‹</button>

<h2 id="monthTitle">Loading...</h2>

<button onclick="nextMonth()">›</button>

</div>


<button class="today-btn"
onclick="gotoToday()">
📅 Today
</button>


<!-- Week -->
<div class="week-title">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>


<!-- Calendar -->
<div id="calendarGrid"class="calendar-grid"></div>

<!-- Legend -->
<div class="calendar-legend">

<div class="legend-item">
<span class="legend-color present-day"></span>
Present
</div>

<div class="legend-item">
<span class="legend-color late-day"></span>
Late
</div>

<div class="legend-item">
<span class="legend-color leave-day"></span>
Leave
</div>

<div class="legend-item">
<span class="legend-color holiday-day"></span>
Holiday
</div>

<div class="legend-item">
<span class="legend-color weekly-day"></span>
Weekly Off
</div>

</div>


<!-- Detail -->

<div id="detailBox"
class="detail-panel">

<h3>Attendance Detail</h3>

<p>Select a date.</p>

</div>


</div>
